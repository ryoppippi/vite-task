# Verifies default cache behavior: tasks cached, scripts not cached

# Task should be cached (tasks default to true)
[[plan]]
name = "task_cached_by_default"
args = ["run", "build"]

# Another task should also be cached
[[plan]]
name = "another_task_cached_by_default"
args = ["run", "deploy"]

# Script not in the tasks map should not be cached
[[plan]]
name = "script_not_cached_by_default"
args = ["run", "test"]
