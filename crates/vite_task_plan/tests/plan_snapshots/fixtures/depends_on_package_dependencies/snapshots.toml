# A selected package (`nearest-order-direct`) transitively depends on another
# selected package (`nearest-order-shared`) only through a task-less package
# (`nearest-order-skip`). No implicit recursion: the two selected `build` tasks
# stay unordered because there is no direct package edge between them.
[[plan]]
compact = true
name = "direct_dependency_tasks_are_not_transitively_ordered"
args = ["run", "@test/nearest-order-app#build"]

[[plan]]
compact = true
name = "direct_dependency_task_does_not_expand"
args = ["run", "@test/dev-a#build"]

[[plan]]
compact = true
name = "ignore_depends_on_omits_object"
args = ["run", "--ignore-depends-on", "test_union"]
cwd = "packages/app"

[[plan]]
compact = true
name = "extra_args_only_reach_requested_object_task"
args = ["run", "test_union", "extra"]
cwd = "packages/app"
