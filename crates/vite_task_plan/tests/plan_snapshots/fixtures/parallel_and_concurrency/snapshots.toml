# Baseline: normal recursive build preserves topo edges
[[plan]]
name = "baseline_recursive_build"
args = ["run", "-r", "build"]
compact = true

# --parallel discards all edges at this level
[[plan]]
name = "parallel_discards_edges"
args = ["run", "-r", "--parallel", "build"]
compact = true

# --parallel only affects the current level; nested Expanded graph preserves edges
[[plan]]
name = "parallel_only_affects_current_level"
args = ["run", "--parallel", "build"]
compact = true

# --concurrency-limit with explicit value
[[plan]]
name = "concurrency_limit_with_explicit_value"
args = ["run", "-r", "--concurrency-limit", "5", "build"]

# --parallel without --concurrency-limit sets concurrency to max
[[plan]]
name = "parallel_without_concurrency_limit"
args = ["run", "-r", "--parallel", "build"]

# --parallel with --concurrency-limit uses explicit concurrency, not max
[[plan]]
name = "parallel_with_concurrency_limit"
args = ["run", "-r", "--parallel", "--concurrency-limit", "3", "build"]

# Nested vt run with explicit --concurrency-limit
[[plan]]
name = "nested_with_explicit_concurrency_limit"
args = ["run", "build-with-concurrency"]

# VP_RUN_CONCURRENCY_LIMIT env var sets concurrency
[[plan]]
name = "env_var_sets_concurrency"
args = ["run", "-r", "build"]
env = { VP_RUN_CONCURRENCY_LIMIT = "7" }

# --concurrency-limit flag takes priority over VP_RUN_CONCURRENCY_LIMIT env
[[plan]]
name = "cli_flag_overrides_env_var"
args = ["run", "-r", "--concurrency-limit", "3", "build"]
env = { VP_RUN_CONCURRENCY_LIMIT = "7" }
