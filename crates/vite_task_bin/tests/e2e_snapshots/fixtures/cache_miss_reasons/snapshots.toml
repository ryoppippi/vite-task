comment = """
Test all cache miss reason variants
"""

[[e2e]]
name = "env_value_changed"
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], envs = [
    [
      "MY_ENV",
      "1",
    ],
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "test",
  ], envs = [
    [
      "MY_ENV",
      "2",
    ],
  ], comment = "cache miss: env value changed" },
]

[[e2e]]
name = "env_added"
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "test",
  ], envs = [
    [
      "MY_ENV",
      "1",
    ],
  ], comment = "cache miss: env added" },
]

[[e2e]]
name = "env_removed"
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], envs = [
    [
      "MY_ENV",
      "1",
    ],
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: env removed" },
]

[[e2e]]
name = "untracked_env_added"
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss" },
  { argv = [
    "vtt",
    "replace-file-content",
    "vite-task.json",
    "\"cache\": true",
    "\"cache\": true, \"untrackedEnv\": [\"MY_UNTRACKED\"]",
  ], comment = "add untracked env" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: untracked env added" },
]

[[e2e]]
name = "untracked_env_removed"
steps = [
  { argv = [
    "vtt",
    "replace-file-content",
    "vite-task.json",
    "\"cache\": true",
    "\"cache\": true, \"untrackedEnv\": [\"MY_UNTRACKED\"]",
  ], comment = "setup" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss" },
  { argv = [
    "vtt",
    "replace-file-content",
    "vite-task.json",
    "\"cache\": true, \"untrackedEnv\": [\"MY_UNTRACKED\"]",
    "\"cache\": true",
  ], comment = "remove untracked env" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: untracked env removed" },
]

[[e2e]]
name = "cwd_changed"
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss" },
  [
    "vtt",
    "mkdir",
    "-p",
    "subfolder",
  ],
  [
    "vtt",
    "cp",
    "test.txt",
    "subfolder/test.txt",
  ],
  { argv = [
    "vtt",
    "replace-file-content",
    "vite-task.json",
    "\"cache\": true",
    "\"cache\": true, \"cwd\": \"subfolder\"",
  ], comment = "change cwd" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: cwd changed" },
]

[[e2e]]
name = "inferred_input_changes"
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss" },
  { argv = [
    "vtt",
    "replace-file-content",
    "test.txt",
    "initial",
    "modified",
  ], comment = "modify input" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: input modified" },
  { argv = [
    "vtt",
    "rm",
    "test.txt",
  ], comment = "remove tracked input" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: input removed" },
  { argv = [
    "vtt",
    "write-file",
    "test.txt",
    "new content",
  ], comment = "recreate previously removed file" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: input added" },
]

[[e2e]]
name = "input_config_changed"
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss" },
  { argv = [
    "vtt",
    "replace-file-content",
    "vite-task.json",
    "\"cache\": true",
    "\"cache\": true, \"input\": [\"test.txt\"]",
  ], comment = "change input config" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: configuration changed" },
]

[[e2e]]
name = "glob_input_changes"
steps = [
  { argv = [
    "vt",
    "run",
    "glob-test",
  ], comment = "cache miss" },
  { argv = [
    "vtt",
    "replace-file-content",
    "test.txt",
    "initial",
    "modified",
  ], comment = "modify glob input" },
  { argv = [
    "vt",
    "run",
    "glob-test",
  ], comment = "cache miss: input modified" },
  { argv = [
    "vtt",
    "write-file",
    "new.txt",
    "new content",
  ], comment = "add a new .txt file" },
  { argv = [
    "vt",
    "run",
    "glob-test",
  ], comment = "cache miss: input added" },
  { argv = [
    "vtt",
    "rm",
    "extra.txt",
  ], comment = "remove a .txt file" },
  { argv = [
    "vt",
    "run",
    "glob-test",
  ], comment = "cache miss: input removed" },
]
