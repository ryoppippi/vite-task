comment = """
Tests that tasks with identical commands share cache entries
"""

[[e2e]]
name = "shared_caching_input"
steps = [
  { argv = [
    "vt",
    "run",
    "script1",
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "script2",
  ], comment = "cache hit, same command as script1" },
  { argv = [
    "vtt",
    "replace-file-content",
    "foo.txt",
    "initial",
    "modified",
  ], comment = "modify shared input" },
  { argv = [
    "vt",
    "run",
    "script2",
  ], comment = "cache miss, input changed" },
  { argv = [
    "vt",
    "run",
    "script1",
  ], comment = "cache hit, script2 already warmed cache" },
]
