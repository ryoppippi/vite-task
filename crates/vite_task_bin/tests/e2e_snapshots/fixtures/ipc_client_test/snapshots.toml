[[e2e]]
name = "ignore_input_keeps_cache_valid"
comment = """
Exercises `ignoreInput` through `@voidzero-dev/vite-task-client`. The runner treats `cache_like/` as non-input for auto-inferred reads, but declared inputs under that path stay in the configured cache key.
"""
ignore = true
steps = [
  { argv = [
    "vtt",
    "write-file",
    "cache_like/input.txt",
    "before",
  ], comment = "seed the file the task will read and ignore" },
  { argv = [
    "vt",
    "run",
    "ignore-input",
  ], comment = "populate the cache" },
  { argv = [
    "vtt",
    "write-file",
    "cache_like/input.txt",
    "after",
  ], comment = "mutate the ignored input — would invalidate if tracked" },
  { argv = [
    "vt",
    "run",
    "ignore-input",
  ], comment = "cache hit: cache_like/ was ignored via ignoreInput" },
  { argv = [
    "vtt",
    "write-file",
    "cache_like/input.txt",
    "manual-before",
  ], comment = "seed the declared input for input: [cache_like/input.txt]" },
  { argv = [
    "vt",
    "run",
    "ignore-input-manual-input",
  ], comment = "populate the cache with the manual-only input fingerprint" },
  { argv = [
    "vtt",
    "write-file",
    "cache_like/input.txt",
    "manual-after",
  ], comment = "mutate the declared input for input: [cache_like/input.txt]" },
  { argv = [
    "vt",
    "run",
    "ignore-input-manual-input",
  ], comment = "cache miss: manual input config wins over ignoreInput" },
  { argv = [
    "vtt",
    "write-file",
    "cache_like/input.txt",
    "auto-manual-before",
  ], comment = "seed the declared input for input: [{ auto: true }, cache_like/input.txt]" },
  { argv = [
    "vt",
    "run",
    "ignore-input-auto-manual-input",
  ], comment = "populate the cache with the auto-plus-manual input fingerprint" },
  { argv = [
    "vtt",
    "write-file",
    "cache_like/input.txt",
    "auto-manual-after",
  ], comment = "mutate the declared input for input: [{ auto: true }, cache_like/input.txt]" },
  { argv = [
    "vt",
    "run",
    "ignore-input-auto-manual-input",
  ], comment = "cache miss: explicit input still wins when auto inference is also enabled" },
]

[[e2e]]
name = "disable_cache_forces_reexecution"
comment = """
Exercises `disableCache`. The tool asks the runner not to cache this run,
so the next invocation re-executes instead of hitting a prior entry.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "disable-cache",
  ], comment = "first run — tool calls disableCache" },
  { argv = [
    "vt",
    "run",
    "disable-cache",
  ], comment = "cache miss (NotFound) because nothing was cached" },
  { argv = [
    "vt",
    "run",
    "--last-details",
  ], comment = "summary names the opt-out as the not-cached reason" },
]

[[e2e]]
name = "disable_cache_works_with_explicit_inputs"
comment = """
Exercises `disableCache` on a cached task with explicit inputs. The runner must still inject IPC even when fspy auto-input inference is disabled, or the tool's cache opt-out becomes a no-op and the second run incorrectly hits.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "disable-cache-explicit-input",
  ], comment = "first run uses input: [] and asks the runner not to cache" },
  { argv = [
    "vt",
    "run",
    "disable-cache-explicit-input",
  ], comment = "re-executes because the first run was not cached" },
  { argv = [
    "vt",
    "run",
    "--last-details",
  ], comment = "summary names the opt-out as the not-cached reason" },
]

[[e2e]]
name = "fetch_env_reads_undeclared_env"
comment = """
Exercises `getEnv(name)`: the tool asks the runner for an env var that is not declared in the task's `env` list. This verifies runner-served envs resolve from the unfiltered spawn env context while the child process env remains cache-filtered.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "fetch-env",
  ], envs = [
    [
      "PROBE_ENV",
      "served",
    ],
  ], comment = "runner serves undeclared PROBE_ENV from the unfiltered env context" },
]

[[e2e]]
name = "fetch_env_sees_command_prefix_env"
comment = """
A command-prefixed env (`PREFIXED_ENV=from-command node ...`) is part of the spawn's full env context. `getEnv('PREFIXED_ENV')` and `process.env.PREFIXED_ENV` must both see the command prefix value.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "fetch-prefixed-env",
  ], comment = "tool asks the runner for an env the command prefix sets" },
]

[[e2e]]
name = "fetch_env_sees_intermediate_prefix_envs"
comment = """
Prefix envs accumulate through nested runs: `outer-prefixed` is `PREFIXED_A=a vt run inner-prefixed`, and `inner-prefixed` is `PREFIXED_B=b node ...`. The inner tool's `getEnv` must see both through the runner's env context, while `process.env` only sees the direct child prefix.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "outer-prefixed",
  ], comment = "outer prefix env reaches the inner tool via the runner" },
]

[[e2e]]
name = "fetch_env_tracked_invalidates_on_change"
comment = """
Exercises `getEnv(name, { tracked: true })`. The env value becomes part of the post-run fingerprint: the same value still hits, and a different value misses with the env var named in the miss message.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "fetch-env",
  ], envs = [
    [
      "PROBE_ENV",
      "first",
    ],
  ], comment = "first run captures PROBE_ENV=first in the post-run fingerprint" },
  { argv = [
    "vt",
    "run",
    "fetch-env",
  ], envs = [
    [
      "PROBE_ENV",
      "first",
    ],
  ], comment = "cache hit: PROBE_ENV unchanged" },
  { argv = [
    "vt",
    "run",
    "fetch-env",
  ], envs = [
    [
      "PROBE_ENV",
      "second",
    ],
  ], comment = "cache miss: tracked PROBE_ENV changed" },
]

[[e2e]]
name = "fetch_env_tracks_with_explicit_inputs"
comment = """
Runner-aware env tracking must not depend on fspy auto-input inference. This task uses `input: []`, but `getEnv(name, { tracked: true })` still records the served value and later env changes miss.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "fetch-env-explicit-input",
  ], envs = [
    [
      "PROBE_ENV",
      "first",
    ],
  ], comment = "first run captures PROBE_ENV even though input auto-inference is disabled" },
  { argv = [
    "vt",
    "run",
    "fetch-env-explicit-input",
  ], envs = [
    [
      "PROBE_ENV",
      "first",
    ],
  ], comment = "cache hit: explicit inputs are unchanged and PROBE_ENV is unchanged" },
  { argv = [
    "vt",
    "run",
    "fetch-env-explicit-input",
  ], envs = [
    [
      "PROBE_ENV",
      "second",
    ],
  ], comment = "cache miss: tracked env changed despite input auto-inference being disabled" },
]

[[e2e]]
name = "fetch_envs_reads_match_set"
comment = """
Exercises `getEnvs(pattern)`: the tool asks the runner for every env matching `PROBE_*` and prints the served match set. This verifies the bulk env IPC round trip before match sets are added to cache fingerprints.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "fetch-envs",
  ], envs = [
    [
      "PROBE_A",
      "a",
    ],
    [
      "PROBE_B",
      "b",
    ],
    [
      "UNRELATED",
      "noise",
    ],
  ], comment = "runner serves only envs matching PROBE_*" },
]

[[e2e]]
name = "fetch_envs_tracks_glob_match_set"
comment = """
Exercises `getEnvs(pattern, { tracked: true })`. The glob `PROBE_*` and its match-set snapshot enter the post-run fingerprint: later runs miss on changed, added, or removed matching envs, but hit when only non-matching envs differ.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "fetch-envs",
  ], envs = [
    [
      "PROBE_A",
      "a",
    ],
    [
      "PROBE_B",
      "b",
    ],
  ], comment = "populate: first run captures {PROBE_A, PROBE_B} under the glob" },
  { argv = [
    "vt",
    "run",
    "fetch-envs",
  ], envs = [
    [
      "PROBE_A",
      "a",
    ],
    [
      "PROBE_B",
      "b",
    ],
  ], comment = "unchanged: same match-set -> cache hit" },
  { argv = [
    "vt",
    "run",
    "fetch-envs",
  ], envs = [
    [
      "PROBE_A",
      "changed",
    ],
    [
      "PROBE_B",
      "b",
    ],
  ], comment = "change: PROBE_A value differs -> cache miss" },
  { argv = [
    "vt",
    "run",
    "fetch-envs",
  ], envs = [
    [
      "PROBE_A",
      "changed",
    ],
    [
      "PROBE_B",
      "b",
    ],
    [
      "PROBE_C",
      "c",
    ],
  ], comment = "add: PROBE_C is new under the glob -> cache miss" },
  { argv = [
    "vt",
    "run",
    "fetch-envs",
  ], envs = [
    [
      "PROBE_B",
      "b",
    ],
    [
      "PROBE_C",
      "c",
    ],
  ], comment = "remove: PROBE_A dropped from the match-set -> cache miss" },
  { argv = [
    "vt",
    "run",
    "fetch-envs",
  ], envs = [
    [
      "PROBE_B",
      "b",
    ],
    [
      "PROBE_C",
      "c",
    ],
    [
      "UNRELATED",
      "noise",
    ],
  ], comment = "non-matching noise: UNRELATED does not match PROBE_* -> cache hit" },
]

[[e2e]]
name = "fetch_env_untracked_does_not_invalidate"
comment = """
Exercises `getEnv(name, { tracked: false })`. The runner still serves the env value, but the value does not enter the post-run fingerprint, so changing it later replays the cached output.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "fetch-env-untracked",
  ], envs = [
    [
      "PROBE_ENV",
      "first",
    ],
  ], comment = "first run serves PROBE_ENV without tracking it" },
  { argv = [
    "vt",
    "run",
    "fetch-env-untracked",
  ], envs = [
    [
      "PROBE_ENV",
      "second",
    ],
  ], comment = "cache hit: PROBE_ENV changed but was requested with tracked: false" },
]

