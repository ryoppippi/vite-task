comment = """
Tests that tasks modifying their own inputs (read-write overlap) are not cached.
vtt replace-file-content reads then writes the same file — fspy detects both.
"""

# Single rw-task: compact summary shows "not cached because it modified its input"
[[e2e]]
name = "single_read_write_task_shows_not_cached_message"
cwd = "packages/rw-pkg"
steps = [["vt", "run", "task"], ["vt", "run", "task"]]

# Multi-task (recursive): compact summary shows stats + InputModified notice
[[e2e]]
name = "multi_task_with_read_write_shows_not_cached_in_summary"
steps = [["vt", "run", "-r", "task"], ["vt", "run", "-r", "task"]]

# Verbose: full summary shows the overlapping path
[[e2e]]
name = "verbose_read_write_task_shows_path_in_full_summary"
cwd = "packages/rw-pkg"
steps = [["vt", "run", "-v", "task"]]

# Single O_RDWR open (touch-file) is also detected as read-write overlap
[[e2e]]
name = "single_O_RDWR_open_is_not_cached"
cwd = "packages/touch-pkg"
steps = [["vt", "run", "task"], ["vt", "run", "task"]]
