comment = """
Tests that tasks with identical commands share cache
"""

[[e2e]]
name = "associate_existing_cache"
steps = [
  { argv = [
    "vt",
    "run",
    "script1",
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "script2",
  ], comment = "cache hit, same command as script1" },
  { argv = [
    "vtt",
    "replace-file-content",
    "package.json",
    "\"script2\": \"vtt print hello\"",
    "\"script2\": \"vtt print world\"",
  ], comment = "change script2" },
  { argv = [
    "vt",
    "run",
    "script2",
  ], comment = "cache miss" },
]
