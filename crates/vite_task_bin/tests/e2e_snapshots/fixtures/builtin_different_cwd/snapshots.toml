comment = """
Tests that synthetic tasks have separate cache per cwd
"""

[[e2e]]
name = "builtin_different_cwd"
steps = [
  { argv = [
    "vt",
    "run",
    "cwd1",
  ], comment = "cache miss in folder1" },
  { argv = [
    "vt",
    "run",
    "cwd2",
  ], comment = "cache miss in folder2 (different cwd)" },
  { argv = [
    "vt",
    "run",
    "cwd1",
  ], comment = "cache hit in folder1" },
  { argv = [
    "vt",
    "run",
    "cwd2",
  ], comment = "cache hit in folder2" },
]
