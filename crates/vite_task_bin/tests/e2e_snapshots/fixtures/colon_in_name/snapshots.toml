# Tests that a task name with colon works correctly with caching

[[e2e]]
name = "read_file_with_colon_in_name"
steps = [
  { argv = [
    "vt",
    "run",
    "read_colon_in_name",
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "read_colon_in_name",
  ], comment = "cache hit" },
]
