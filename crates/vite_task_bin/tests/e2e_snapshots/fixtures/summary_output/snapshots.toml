comment = """
Tests for compact and verbose summary output
"""

# Single task, cache miss → no summary at all
[[e2e]]
name = "single_task_cache_miss_shows_no_summary"
cwd = "packages/a"
steps = [["vt", "run", "build"]]

# Single task, cache hit → compact one-liner
[[e2e]]
name = "single_task_cache_hit_shows_compact_summary"
cwd = "packages/a"
steps = [
  { argv = [
    "vt",
    "run",
    "build",
  ], comment = "first run, cache miss" },
  { argv = [
    "vt",
    "run",
    "build",
  ], comment = "second run, cache hit → compact summary" },
]

# Multi-task (recursive), all cache miss → compact summary with 0 hits
[[e2e]]
name = "multi_task_all_cache_miss_shows_compact_summary"
steps = [["vt", "run", "-r", "build"]]

# Multi-task (recursive), some cache hits → compact summary with hit count
[[e2e]]
name = "multi_task_with_cache_hits_shows_compact_summary"
steps = [
  { argv = [
    "vt",
    "run",
    "-r",
    "build",
  ], comment = "first run, all miss" },
  { argv = [
    "vt",
    "run",
    "-r",
    "build",
  ], comment = "second run, all hit" },
]

# Single task with --verbose → full detailed summary
[[e2e]]
name = "single_task_verbose_shows_full_summary"
cwd = "packages/a"
steps = [["vt", "run", "-v", "build"]]

# Multi-task with --verbose → full detailed summary
[[e2e]]
name = "multi_task_verbose_shows_full_summary"
steps = [["vt", "run", "-r", "-v", "build"]]

# Multi-task with --verbose after cache hits
[[e2e]]
name = "multi_task_verbose_with_cache_hits_shows_full_summary"
steps = [
  { argv = [
    "vt",
    "run",
    "-r",
    "build",
  ], comment = "first run, populate cache" },
  { argv = [
    "vt",
    "run",
    "-r",
    "-v",
    "build",
  ], comment = "second run, verbose with cache hits" },
]

# --last-details with no previous run
[[e2e]]
name = "last_details_with_no_previous_run_shows_error"
steps = [["vt", "run", "--last-details"]]

# --last-details after a run shows saved summary
[[e2e]]
name = "last_details_after_run_shows_saved_summary"
cwd = "packages/a"
steps = [
  { argv = [
    "vt",
    "run",
    "build",
  ], comment = "populate summary file" },
  { argv = [
    "vt",
    "run",
    "--last-details",
  ], comment = "display saved summary" },
]

# --last-details after a multi-task run
[[e2e]]
name = "last_details_after_multi_task_run_shows_saved_summary"
steps = [
  { argv = [
    "vt",
    "run",
    "-r",
    "build",
  ], comment = "populate summary file" },
  { argv = [
    "vt",
    "run",
    "--last-details",
  ], comment = "display saved summary" },
]
