[[e2e]]
name = "vite_build_caches_and_restores_outputs"
comment = """
`vt run --cache build` must produce a cache hit on the second run without any manual input/output configuration. Vite reports non-semantic reads and writes through `@voidzero-dev/vite-task-client`, so fspy can infer real inputs and outputs while the cache restores `dist/` on hit.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], comment = "first run: cache miss, emits dist/" },
  { argv = [
    "vtt",
    "stat-file",
    "dist/assets/main.js",
  ], comment = "existence check — content can drift across Vite versions" },
  { argv = [
    "vtt",
    "rm",
    "dist/assets/main.js",
  ], comment = "remove the artefact so the cache-hit restore is observable" },
  { argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], comment = "cache hit: outputs restored without manual config" },
  { argv = [
    "vtt",
    "stat-file",
    "dist/assets/main.js",
  ], comment = "restored from the cache archive" },
]

[[e2e]]
name = "vite_prefix_env_change_invalidates_cache"
comment = """
`VITE_CACHE_LABEL` is picked up by Vite's patched `loadEnv`, which asks the runner for every `VITE_*` env via `getEnvs(pattern, { tracked: true })`. Flipping its value between runs must invalidate the cache AND change the build output because Vite substitutes `import.meta.env.VITE_CACHE_LABEL` at build time.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], envs = [
    [
      "VITE_CACHE_LABEL",
      "cache-alpha",
    ],
  ], comment = "first run: cache-alpha label" },
  { argv = [
    "vtt",
    "grep-file",
    "dist/assets/main.js",
    "cache-alpha",
  ], comment = "cache-alpha label is in the bundle" },
  { argv = [
    "vtt",
    "grep-file",
    "dist/assets/main.js",
    "cache-bravo",
  ], comment = "cache-bravo label is not in the bundle yet" },
  { argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], envs = [
    [
      "VITE_CACHE_LABEL",
      "cache-alpha",
    ],
  ], comment = "cache hit: VITE_CACHE_LABEL unchanged" },
  { argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], envs = [
    [
      "VITE_CACHE_LABEL",
      "cache-bravo",
    ],
  ], comment = "cache miss: envs changed — VITE_CACHE_LABEL value changed" },
  { argv = [
    "vtt",
    "grep-file",
    "dist/assets/main.js",
    "cache-alpha",
  ], comment = "cache-alpha label is gone after the rebuild" },
  { argv = [
    "vtt",
    "grep-file",
    "dist/assets/main.js",
    "cache-bravo",
  ], comment = "cache-bravo label is now in the bundle" },
]

[[e2e]]
name = "vite_build_cache_is_portable_across_workspace_roots"
comment = """
Two identical plain Vite workspaces run from different absolute roots. The test copies the origin root's default task cache directory into the clone root to simulate uploading and downloading cache data; the clone should hit that copied cache and restore build outputs.
"""
ignore = true
steps = [
  { cwd = "portable_origin", argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], comment = "origin workspace root: cache miss populates its default cache" },
  { cwd = "portable_origin", argv = [
    "vtt",
    "stat-file",
    "dist/assets/index.js",
  ], comment = "origin emitted the non-hashed build asset" },
  { argv = [
    "vtt",
    "cp",
    "-r",
    "portable_origin/node_modules/.vite/task-cache",
    "portable_clone/node_modules/.vite/task-cache",
  ], comment = "copy-paste the cache directory to simulate upload/download" },
  { cwd = "portable_clone", argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], comment = "clone workspace root: cache hit from the origin root" },
  { cwd = "portable_clone", argv = [
    "vtt",
    "stat-file",
    "dist/assets/index.js",
  ], comment = "clone restored the non-hashed asset from the portable cache archive" },
]

[[e2e]]
name = "vite_node_env_change_invalidates_cache"
comment = """
`NODE_ENV` enters the build's cache fingerprint via Vite's `getEnv('NODE_ENV')` call in `resolveConfig`. Same value → cache hit; different value → cache miss with `envs changed`.
"""
ignore = true
steps = [
  { argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], envs = [
    [
      "NODE_ENV",
      "production",
    ],
  ], comment = "first run: NODE_ENV=production" },
  { argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], envs = [
    [
      "NODE_ENV",
      "production",
    ],
  ], comment = "cache hit: NODE_ENV unchanged" },
  { argv = [
    "vt",
    "run",
    "--cache",
    "build",
  ], envs = [
    [
      "NODE_ENV",
      "development",
    ],
  ], comment = "cache miss: envs changed (NODE_ENV changed)" },
]
