comment = """
Tests that different extra args get separate cache entries
"""

[[e2e]]
name = "individual_cache_for_extra_args"
steps = [
  { argv = [
    "vt",
    "run",
    "say",
    "a",
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "say",
    "b",
  ], comment = "cache miss, different args" },
  { argv = [
    "vt",
    "run",
    "say",
    "a",
  ], comment = "cache hit" },
  { argv = [
    "vt",
    "run",
    "say",
    "b",
  ], comment = "cache hit" },
]
