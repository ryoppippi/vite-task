[[e2e]]
name = "output_globs___files_restored_on_cache_hit"
comment = """
With explicit output globs (`dist/**`), the first run writes a file to `dist/`. After deleting `dist/`, a second run with no input changes is a cache hit and the archived output file is restored.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "build",
  ], comment = "first run — cache miss, writes dist/output.txt" },
  { argv = [
    "vtt",
    "print-file",
    "dist/output.txt",
  ], comment = "file is on disk after the run" },
  { argv = [
    "vtt",
    "rm",
    "-rf",
    "dist",
  ], comment = "delete dist/ to prove the restore is real" },
  { argv = [
    "vt",
    "run",
    "build",
  ], comment = "second run — cache hit, restores from archive" },
  { argv = [
    "vtt",
    "print-file",
    "dist/output.txt",
  ], comment = "file restored from archive" },
]

[[e2e]]
name = "output_globs___old_archive_removed_on_rewrite"
comment = """
When a cached task re-runs (cache miss because an input changed), it writes a new archive and the previous archive file is cleaned up. After two cache-missing runs of the same task the cache directory still contains only one `.tar.zst` archive.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "build",
  ], comment = "first run — cache miss, writes archive A" },
  { argv = [
    "vtt",
    "list-dir",
    "node_modules/.vite/task-cache",
    "--ext",
    ".tar.zst",
    "--recursive",
  ], comment = "exactly one archive on disk" },
  { argv = [
    "vtt",
    "write-file",
    "src/main.ts",
    "changed",
  ], comment = "modify an input so the next run is a cache miss" },
  { argv = [
    "vt",
    "run",
    "build",
  ], comment = "second run — cache miss, writes archive B and removes A" },
  { argv = [
    "vtt",
    "list-dir",
    "node_modules/.vite/task-cache",
    "--ext",
    ".tar.zst",
    "--recursive",
  ], comment = "still exactly one archive — A was cleaned up" },
]

[[e2e]]
name = "output_globs___negative_excludes_files_from_archive"
comment = """
A file matched by a negative output glob is not archived, so it is not restored on cache hit.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "build-with-negative",
  ], comment = "first run — writes dist/keep.txt and dist/skip.txt" },
  { argv = [
    "vtt",
    "print-file",
    "dist/keep.txt",
  ], comment = "keep.txt was written" },
  { argv = [
    "vtt",
    "print-file",
    "dist/skip.txt",
  ], comment = "skip.txt was written" },
  { argv = [
    "vtt",
    "rm",
    "-rf",
    "dist",
  ], comment = "delete dist/ to prove the restore is real" },
  { argv = [
    "vt",
    "run",
    "build-with-negative",
  ], comment = "second run — cache hit, restores from archive" },
  { argv = [
    "vtt",
    "print-file",
    "dist/keep.txt",
  ], comment = "keep.txt restored from archive" },
  { argv = [
    "vtt",
    "print-file",
    "dist/skip.txt",
  ], comment = "skip.txt is NOT restored — it was excluded by the negative glob" },
]
