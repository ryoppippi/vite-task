comment = """
Test glob base directory behavior
Globs are relative to PACKAGE directory, NOT task cwd
No special cross-package filtering - just normal relative path matching
"""

# 1. Root package - glob matches files in root's src/
[[e2e]]
name = "root_glob___matches_src_files"
steps = [
  ["vt", "run", "root-glob-test"],
  # Modify matched file
  ["vtt", "replace-file-content", "src/root.ts", "initial", "modified"],
  # Cache miss: file matches glob
  ["vt", "run", "root-glob-test"],
]

[[e2e]]
name = "root_glob___unmatched_directory"
steps = [
  ["vt", "run", "root-glob-test"],
  # Modify file outside glob pattern
  ["vtt", "replace-file-content", "other/other.ts", "initial", "modified"],
  # Cache hit: file doesn't match glob
  ["vt", "run", "root-glob-test"],
]

[[e2e]]
name = "root_glob___subpackage_path_unmatched_by_relative_glob"
steps = [
  ["vt", "run", "root-glob-test"],
  # Modify file in subpackage - relative glob src/** doesn't reach packages/sub-pkg/src/
  ["vtt", "replace-file-content", "packages/sub-pkg/src/sub.ts", "initial", "modified"],
  # Cache hit: path simply doesn't match the relative glob pattern
  ["vt", "run", "root-glob-test"],
]

# 2. Root package with custom cwd - glob still relative to package root
[[e2e]]
name = "root_glob_with_cwd___glob_relative_to_package_not_cwd"
steps = [
  ["vt", "run", "root-glob-with-cwd"],
  # Modify file - glob is src/** relative to package root
  ["vtt", "replace-file-content", "src/root.ts", "initial", "modified"],
  # Cache miss: file matches glob (relative to package, not cwd)
  ["vt", "run", "root-glob-with-cwd"],
]

# 3. Subpackage - glob matches files in subpackage's src/
[[e2e]]
name = "subpackage_glob___matches_own_src_files"
steps = [
  ["vt", "run", "sub-pkg#sub-glob-test"],
  # Modify matched file in subpackage
  ["vtt", "replace-file-content", "packages/sub-pkg/src/sub.ts", "initial", "modified"],
  # Cache miss: file matches subpackage's glob
  ["vt", "run", "sub-pkg#sub-glob-test"],
]

[[e2e]]
name = "subpackage_glob___unmatched_directory_in_subpackage"
steps = [
  ["vt", "run", "sub-pkg#sub-glob-test"],
  # Modify file outside glob pattern
  ["vtt", "replace-file-content", "packages/sub-pkg/other/other.ts", "initial", "modified"],
  # Cache hit: file doesn't match glob
  ["vt", "run", "sub-pkg#sub-glob-test"],
]

[[e2e]]
name = "subpackage_glob___root_path_unmatched_by_relative_glob"
steps = [
  ["vt", "run", "sub-pkg#sub-glob-test"],
  # Modify file in root - relative glob src/** is resolved from subpackage dir
  ["vtt", "replace-file-content", "src/root.ts", "initial", "modified"],
  # Cache hit: path simply doesn't match the relative glob pattern
  ["vt", "run", "sub-pkg#sub-glob-test"],
]

# 4. Subpackage with custom cwd - glob still relative to subpackage root
[[e2e]]
name = "subpackage_glob_with_cwd___glob_relative_to_package_not_cwd"
steps = [
  ["vt", "run", "sub-pkg#sub-glob-with-cwd"],
  # Modify file - glob is src/** relative to subpackage root
  ["vtt", "replace-file-content", "packages/sub-pkg/src/sub.ts", "initial", "modified"],
  # Cache miss: file matches glob (relative to subpackage, not cwd)
  ["vt", "run", "sub-pkg#sub-glob-with-cwd"],
]
