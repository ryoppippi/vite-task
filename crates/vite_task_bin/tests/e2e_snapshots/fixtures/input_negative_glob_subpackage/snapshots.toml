comment = """
Test that negative input globs work correctly for subpackages.
Bug: negative globs were matched against workspace-relative paths
instead of package-relative paths, so exclusions like !dist/**
failed for subpackages.
"""

# Auto + negative in subpackage: input: [{ "auto": true }, "!dist/**"]
# - dist/ should be excluded even though the package is a subpackage
# - Modifying dist/output.js should be a cache hit
[[e2e]]
name = "subpackage_auto_with_negative___hit_on_excluded_inferred_file"
steps = [
  # First run - reads both src/main.ts and dist/output.js
  ["vt", "run", "sub-pkg#auto-with-negative"],
  # Modify file in excluded directory (dist/)
  ["vtt", "replace-file-content", "packages/sub-pkg/dist/output.js", "initial", "modified"],
  # Cache hit: dist/ is excluded by negative glob
  ["vt", "run", "sub-pkg#auto-with-negative"],
]

[[e2e]]
name = "subpackage_auto_with_negative___miss_on_non_excluded_inferred_file"
steps = [
  # First run
  ["vt", "run", "sub-pkg#auto-with-negative"],
  # Modify file NOT in excluded directory
  ["vtt", "replace-file-content", "packages/sub-pkg/src/main.ts", "initial", "modified"],
  # Cache miss: inferred input changed
  ["vt", "run", "sub-pkg#auto-with-negative"],
]

# .. prefix positive globs: input: ["../shared/src/**"]
# - Should find files in sibling package via ..
# - Cache miss when sibling file changes, hit when unrelated file changes
[[e2e]]
name = "dotdot_positive_glob___miss_on_sibling_file_change"
steps = [
  ["vt", "run", "sub-pkg#dotdot-positive"],
  # Modify a file that matches ../shared/src/**
  ["vtt", "replace-file-content", "packages/shared/src/utils.ts", "initial", "modified"],
  # Cache miss: matched file changed
  ["vt", "run", "sub-pkg#dotdot-positive"],
]

[[e2e]]
name = "dotdot_positive_glob___hit_on_unmatched_file_change"
steps = [
  ["vt", "run", "sub-pkg#dotdot-positive"],
  # Modify a file NOT matched by ../shared/src/**
  ["vtt", "replace-file-content", "packages/shared/dist/output.js", "initial", "modified"],
  # Cache hit: file not in input
  ["vt", "run", "sub-pkg#dotdot-positive"],
]

# .. prefix positive + negative globs: input: ["../shared/**", "!../shared/dist/**"]
# - Positive glob matches sibling package files via ..
# - Negative glob excludes sibling dist/ via ..
[[e2e]]
name = "dotdot_positive_negative___miss_on_non_excluded_sibling_file"
steps = [
  ["vt", "run", "sub-pkg#dotdot-positive-negative"],
  # Modify file matching positive but NOT negative
  ["vtt", "replace-file-content", "packages/shared/src/utils.ts", "initial", "modified"],
  # Cache miss: file changed
  ["vt", "run", "sub-pkg#dotdot-positive-negative"],
]

[[e2e]]
name = "dotdot_positive_negative___hit_on_excluded_sibling_file"
steps = [
  ["vt", "run", "sub-pkg#dotdot-positive-negative"],
  # Modify file in excluded sibling dist/
  ["vtt", "replace-file-content", "packages/shared/dist/output.js", "initial", "modified"],
  # Cache hit: excluded by !../shared/dist/**
  ["vt", "run", "sub-pkg#dotdot-positive-negative"],
]

# .. prefix auto + negative: input: [{ "auto": true }, "!../shared/dist/**"]
# - Auto-inferred files from sibling package are tracked
# - Negative glob excludes sibling dist/ from inferred input
[[e2e]]
name = "dotdot_auto_negative___hit_on_excluded_sibling_inferred_file"
steps = [
  ["vt", "run", "sub-pkg#dotdot-auto-negative"],
  # Modify file in excluded sibling dist/
  ["vtt", "replace-file-content", "packages/shared/dist/output.js", "initial", "modified"],
  # Cache hit: excluded by !../shared/dist/**
  ["vt", "run", "sub-pkg#dotdot-auto-negative"],
]

[[e2e]]
name = "dotdot_auto_negative___miss_on_non_excluded_sibling_inferred_file"
steps = [
  ["vt", "run", "sub-pkg#dotdot-auto-negative"],
  # Modify non-excluded sibling file
  ["vtt", "replace-file-content", "packages/shared/src/utils.ts", "initial", "modified"],
  # Cache miss: inferred input changed
  ["vt", "run", "sub-pkg#dotdot-auto-negative"],
]
