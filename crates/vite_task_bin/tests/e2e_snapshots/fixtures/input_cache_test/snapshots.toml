# Test all input configuration combinations for cache behavior

# 1. Positive globs only: input: ["src/**/*.ts"]
# - Files matching the glob trigger cache invalidation
# - Files outside the glob do NOT trigger cache invalidation
[[e2e]]
name = "positive_globs_only___cache_hit_on_second_run"
steps = [
  # First run - cache miss
  ["vt", "run", "positive-globs-only"],
  # Second run - cache hit
  ["vt", "run", "positive-globs-only"],
]

[[e2e]]
name = "positive_globs_only___miss_on_matched_file_change"
steps = [
  # Initial run
  ["vt", "run", "positive-globs-only"],
  # Modify a file that matches the glob
  ["vtt", "replace-file-content", "src/main.ts", "initial", "modified"],
  # Cache miss: matched file changed
  ["vt", "run", "positive-globs-only"],
]

[[e2e]]
name = "positive_globs_only___hit_on_unmatched_file_change"
steps = [
  # Initial run
  ["vt", "run", "positive-globs-only"],
  # Modify a file that does NOT match the glob (test/ is outside src/)
  ["vtt", "replace-file-content", "test/main.test.ts", "outside", "modified"],
  # Cache hit: file not in input
  ["vt", "run", "positive-globs-only"],
]

# 1b. Positive globs reads unmatched file: input: ["src/main.ts"], command reads src/utils.ts too
# - File read by command but NOT matched by glob should NOT be fingerprinted
# - This tests that inference is truly disabled when only explicit globs are used
[[e2e]]
name = "positive_globs___hit_on_read_but_unmatched_file"
steps = [
  # Initial run - reads both src/main.ts and src/utils.ts
  ["vt", "run", "positive-globs-reads-unmatched"],
  # Modify utils.ts - read by command but NOT in glob
  ["vtt", "replace-file-content", "src/utils.ts", "initial", "modified"],
  # Cache hit: file was read but not matched by glob, inference is off
  ["vt", "run", "positive-globs-reads-unmatched"],
]

# 2. Positive + negative globs: input: ["src/**", "!src/**/*.test.ts"]
# - Files matching positive but NOT negative trigger invalidation
# - Files matching negative glob are excluded
[[e2e]]
name = "positive_negative_globs___miss_on_non_excluded_file"
steps = [
  # Initial run
  ["vt", "run", "positive-negative-globs"],
  # Modify a file that matches positive but NOT negative
  ["vtt", "replace-file-content", "src/main.ts", "initial", "modified"],
  # Cache miss: file changed
  ["vt", "run", "positive-negative-globs"],
]

[[e2e]]
name = "positive_negative_globs___hit_on_excluded_file"
steps = [
  # Initial run
  ["vt", "run", "positive-negative-globs"],
  # Modify a file that matches the negative glob (excluded)
  ["vtt", "replace-file-content", "src/main.test.ts", "main", "modified"],
  # Cache hit: file excluded by negative glob
  ["vt", "run", "positive-negative-globs"],
]

# 3. Auto only: input: [{ "auto": true }]
# - Files read by the command trigger invalidation (fspy inference)
# - Files NOT read by the command do NOT trigger invalidation
[[e2e]]
name = "auto_only___miss_on_inferred_file_change"
steps = [
  # Initial run - reads src/main.ts
  ["vt", "run", "auto-only"],
  # Modify the file that was read
  ["vtt", "replace-file-content", "src/main.ts", "initial", "modified"],
  # Cache miss: inferred input changed
  ["vt", "run", "auto-only"],
]

[[e2e]]
name = "auto_only___hit_on_non_inferred_file_change"
steps = [
  # Initial run - reads src/main.ts (NOT utils.ts)
  ["vt", "run", "auto-only"],
  # Modify a file that was NOT read by the command
  ["vtt", "replace-file-content", "src/utils.ts", "initial", "modified"],
  # Cache hit: file not in inferred input
  ["vt", "run", "auto-only"],
]

# 4. Auto + negative: input: [{ "auto": true }, "!dist/**"]
# - Inferred files are tracked, but negative globs filter them out
# - Files in excluded directories don't trigger invalidation even if read
[[e2e]]
name = "auto_with_negative___hit_on_excluded_inferred_file"
steps = [
  # Initial run - reads both src/main.ts and dist/output.js
  ["vt", "run", "auto-with-negative"],
  # Modify file in excluded directory (dist/)
  ["vtt", "replace-file-content", "dist/output.js", "initial", "modified"],
  # Cache hit: dist/ is excluded by negative glob
  ["vt", "run", "auto-with-negative"],
]

[[e2e]]
name = "auto_with_negative___miss_on_non_excluded_inferred_file"
steps = [
  # Initial run
  ["vt", "run", "auto-with-negative"],
  # Modify file NOT in excluded directory
  ["vtt", "replace-file-content", "src/main.ts", "initial", "modified"],
  # Cache miss: inferred input changed
  ["vt", "run", "auto-with-negative"],
]

# 5. Positive + auto + negative: input: ["package.json", { "auto": true }, "!src/**/*.test.ts"]
# - Explicit globs AND inferred files are both tracked
# - Negative globs apply to both explicit and inferred input
[[e2e]]
name = "positive_auto_negative___miss_on_explicit_glob_file"
steps = [
  # Initial run
  ["vt", "run", "positive-auto-negative"],
  # Modify explicit input file
  ["vtt", "replace-file-content", "package.json", "inputs-cache-test", "modified-pkg"],
  # Cache miss: explicit input changed
  ["vt", "run", "positive-auto-negative"],
]

[[e2e]]
name = "positive_auto_negative___miss_on_inferred_file"
steps = [
  # Initial run
  ["vt", "run", "positive-auto-negative"],
  # Modify inferred input file (read by command)
  ["vtt", "replace-file-content", "src/main.ts", "initial", "modified"],
  # Cache miss: inferred input changed
  ["vt", "run", "positive-auto-negative"],
]

[[e2e]]
name = "positive_auto_negative___hit_on_excluded_file"
steps = [
  # Initial run
  ["vt", "run", "positive-auto-negative"],
  # Modify file excluded by negative glob
  ["vtt", "replace-file-content", "src/main.test.ts", "main", "modified"],
  # Cache hit: file excluded by negative glob
  ["vt", "run", "positive-auto-negative"],
]

# 6. Empty input: input: []
# - No file changes affect the cache
# - Only command/env changes trigger cache invalidation
[[e2e]]
name = "empty_input___hit_despite_file_changes"
steps = [
  # Initial run
  ["vt", "run", "empty-inputs"],
  # Modify any file - should NOT affect cache
  ["vtt", "replace-file-content", "src/main.ts", "initial", "modified"],
  # Cache hit: no input configured
  ["vt", "run", "empty-inputs"],
]

[[e2e]]
name = "empty_input___miss_on_command_change"
steps = [
  # Initial run
  [
    "vt",
    "run",
    "empty-inputs",
  ],
  # Change the command
  [
    "vtt",
    "replace-file-content",
    "vite-task.json",
    "vtt print-file ./src/main.ts",
    "vtt print-file src/utils.ts",
  ],
  # Cache miss: command changed
  [
    "vt",
    "run",
    "empty-inputs",
  ],
]

# 7. FSPY environment variable
# - FSPY=1 is set when fspy is enabled (includes_auto is true)
# - FSPY is NOT set when fspy is disabled (explicit globs only)
[[e2e]]
name = "fspy_env___set_when_auto_inference_enabled"
steps = [
  # Run task with auto inference - should see FSPY=1
  ["vt", "run", "check-fspy-env-with-auto"],
]

[[e2e]]
name = "fspy_env___not_set_when_auto_inference_disabled"
steps = [
  # Run task without auto inference - should see (undefined)
  ["vt", "run", "check-fspy-env-without-auto"],
]

# 8. Trailing slash input: input: ["src/"]
# - Trailing `/` is expanded to `/**`, matching all files under that directory
# - Direct and nested file changes trigger cache invalidation
# - Files outside the directory do NOT trigger cache invalidation
[[e2e]]
name = "folder_slash_input___miss_on_direct_and_nested_file_changes"
steps = [
  ["vt", "run", "folder-slash-input"],
  # Modify a direct file in src/
  ["vtt", "replace-file-content", "src/main.ts", "initial", "modified"],
  # Cache miss: direct file changed
  ["vt", "run", "folder-slash-input"],
  # Reset and run again to re-establish cache
  ["vtt", "replace-file-content", "src/main.ts", "modified", "initial"],
  ["vt", "run", "folder-slash-input"],
  # Modify a nested file in src/sub/
  ["vtt", "replace-file-content", "src/sub/nested.ts", "initial", "modified"],
  # Cache miss: nested file changed
  ["vt", "run", "folder-slash-input"],
]

[[e2e]]
name = "folder_slash_input___hit_on_file_outside_directory"
steps = [
  ["vt", "run", "folder-slash-input"],
  # Modify a file outside src/
  ["vtt", "replace-file-content", "test/main.test.ts", "outside", "modified"],
  # Cache hit: file not under src/
  ["vt", "run", "folder-slash-input"],
]

# 9. Folder path as input: input: ["src"]
# - A bare directory name matches nothing (directories are not files)
# - File changes inside the folder should NOT trigger cache invalidation
[[e2e]]
name = "folder_input___hit_despite_file_changes_and_folder_deletion"
steps = [
  ["vt", "run", "folder-input"],
  # Modify a file inside the folder
  ["vtt", "replace-file-content", "src/main.ts", "initial", "modified"],
  # Cache hit: "src" matches the directory itself, not files inside it
  ["vt", "run", "folder-input"],
  # Delete the entire folder
  ["vtt", "rm", "-rf", "src"],
  # Cache hit: folder removal doesn't affect fingerprint
  ["vt", "run", "folder-input"],
]
