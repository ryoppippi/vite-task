[[e2e]]
name = "folder_slash_input___miss_on_direct_and_nested_file_changes"
comment = """
A trailing-slash input (`src/`) should expand to `src/**`, so both direct and nested file changes under it invalidate the cache.
"""
steps = [
  ["vt", "run", "folder-slash-input"],
  # Modify a direct file in src/
  ["vtt", "replace-file-content", "src/main.ts", "initial", "modified"],
  # Cache miss: direct file changed
  ["vt", "run", "folder-slash-input"],
  # Reset and run again to re-establish cache
  ["vtt", "replace-file-content", "src/main.ts", "modified", "initial"],
  ["vt", "run", "folder-slash-input"],
  # Modify a nested file in src/sub/
  ["vtt", "replace-file-content", "src/sub/nested.ts", "initial", "modified"],
  # Cache miss: nested file changed
  ["vt", "run", "folder-slash-input"],
]

