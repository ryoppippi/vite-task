packages:
  - .
  - packages/tools
  - packages/vite-task-client

allowBuilds:
  '@playwright/browser-chromium': true
  bun: true
  deno: true

catalog:
  '@anthropic-ai/sandbox-runtime': 0.0.67
  '@openai/codex': 0.145.0
  '@tsconfig/strictest': ^2.0.8
  '@types/node': 25.0.3
  '@playwright/browser-chromium': 1.61.1
  '@vitest/browser-playwright': 4.1.10
  bun: 1.3.14
  cross-env: ^10.1.0
  deno: 2.9.3
  husky: ^9.1.7
  lint-staged: ^17.0.0
  oxfmt: 0.60.0
  oxlint: ^1.55.0
  oxlint-tsgolint: ^7.0.0
  # Playwright 1.52 pins the browser package to Chromium 136.
  playwright: 1.61.1
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.6
  vitest: 4.1.10

catalogMode: prefer
overrides:
  playwright: 1.61.1
  vite: 'catalog:'
  # The e2e harness symlinks packages/tools' `vite` binary into fixtures to
  # exercise the real vite-task-client integration. The global `vite: catalog:`
  # override above routes vite to the Vite+ toolchain fork, which does not carry
  # the integration — so scope vite-task-tools' `vite` to a real upstream build.
  vite-task-tools>vite: 8.1.5
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: '*'
