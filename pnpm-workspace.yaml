packages:
  - .
  - packages/tools
  - packages/vite-task-client

catalog:
  '@tsconfig/strictest': ^2.0.8
  '@types/node': 25.0.3
  cross-env: ^10.1.0
  husky: ^9.1.7
  lint-staged: ^17.0.0
  oxfmt: 0.42.0
  oxlint: ^1.55.0
  oxlint-tsgolint: ^0.18.0
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.23
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.23
  vite-plus: ^0.1.23

catalogMode: prefer
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
